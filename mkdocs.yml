site_name: TEP Studio Documentation
site_description: Documentation for TEP Studio, a schema-driven Python simulator for the modified Tennessee Eastman Process.
site_url: "https://khalidlabs.com/tep-studio/"
repo_url: "https://github.com/khalidlabs/tep-studio"
repo_name: khalidlabs/tep-studio

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - First Simulation: first-simulation.md
  - Cookbook: cookbook.md
  - User Guide: user-guide.md
  - Core Concepts: concepts.md
  - Architecture: architecture.md
  - Working with Data: data.md
  - Gymnasium and RL: gymnasium.md
  - Optimization: optimization.md
  - Closed-Loop Control: control.md
  - Interface (Studio): ui.md
  - Validation: validation.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
  - Reference:
      - Public API: reference/api.md
      - Process Schema: reference/schema.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
