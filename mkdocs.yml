site_name: TEP Studio Documentation
site_description: Practical documentation for the Python Tennessee Eastman Process simulator.
site_url: ""
repo_url: ""

theme:
  name: mkdocs
  navigation_depth: 3

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - First Simulation: first-simulation.md
  - Cookbook: cookbook.md
  - User Guide: user-guide.md
  - Core Concepts: concepts.md
  - Architecture: architecture.md
  - Working with Data: data.md
  - Gymnasium and RL: gymnasium.md
  - Optimization: optimization.md
  - Closed-Loop Control: control.md
  - Interface (Studio): ui.md
  - Validation: validation.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
  - Reference:
      - Public API: reference/api.md
      - Process Schema: reference/schema.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
