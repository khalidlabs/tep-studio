name: Wheels

# Build cross-platform wheels (+ sdist) and publish to PyPI on a version tag.
# cibuildwheel compiles the native temexd_mod.c kernel for each target and runs the
# import smoke test configured in [tool.cibuildwheel]. Architecture is chosen by the
# runner, so each job builds its native arch (no QEMU needed).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # linux x86_64 / macOS arm64 / windows AMD64.
        # Omitted for now (these users install from the sdist; add wheels in a patch):
        # - Linux aarch64 (ubuntu-24.04-arm): flaky manylinux build.
        # - Intel macOS (macos-13): GitHub's Intel runners queue indefinitely. To restore
        #   x86_64 macOS without it, cross-compile on macos-14 (archs = arm64 + x86_64).
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        # Targets, skips, and the test command come from [tool.cibuildwheel] in pyproject.toml.

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only publish on a version tag; manual/dispatch runs build-and-test without uploading.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing (OIDC) — no stored API token required
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uploads every wheel + the sdist in dist/ via this repository's configured
        # PyPI Trusted Publisher. Set up the publisher (and switch to TestPyPI for a
        # dry run via `with: repository-url: https://test.pypi.org/legacy/`) first.
